<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Creation - Modern Design</title>
    <style>
        /* --- DISEÑO MINIMALISTA MODERNIZADO --- */
        :root {
            --accent: #ffffff;
            --bg-dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text-secondary: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif;
            cursor: none;
        }

        body {
            background-color: var(--bg-dark);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* CURSOR ANILLO (Efecto Lente) */
        #custom-cursor {
            width: 30px;
            height: 30px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transition: transform 0.15s cubic-bezier(0.2, 0, 0.2, 1), 
                        background 0.3s ease, 
                        width 0.3s ease, 
                        height 0.3s ease;
            transform: translate(-50%, -50%);
            /* Solo invierte lo que toca el borde y un fondo muy tenue */
            mix-blend-mode: difference;
        }

        #custom-cursor.active {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 1); /* Se llena de blanco */
            mix-blend-mode: difference; /* Esto hará que el blanco sobre blanco se vea NEGRO */
        }

        /* FONDO DINÁMICO */
        .video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            filter: brightness(0.5) contrast(1.1);
        }

        .video-background iframe {
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }

        /* CONTENEDORES */
        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 90%;
            max-width: 450px;
            perspective: 1000px;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        h1 {
            font-weight: 200;
            font-size: 1.8rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 35px;
            opacity: 0.9;
        }

        /* BOTONES MODERNOS */
        .button-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 18px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: white;
            color: black;
            border-color: white;
            transform: translateY(-2px);
        }

        /* DROPDOWNS */
        .dropdown { position: relative; }

        .dropdown-content {
            position: absolute;
            left: 105%;
            top: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            opacity: 0;
            visibility: hidden;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .dropdown:hover .dropdown-content {
            opacity: 1;
            visibility: visible;
            transform: translateX(0);
        }

        .btn-sub {
            width: 160px;
            padding: 12px;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--border);
        }

        /* PANEL INFERIOR */
        .instruction-panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
        }

        .lang-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-lang {
            flex: 1;
            padding: 8px;
            background: transparent;
            font-size: 0.7rem;
            text-transform: uppercase;
            border-radius: 10px;
        }

        .instruction-content {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 12px;
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text-secondary);
            min-height: 80px;
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <div class="video-background">
        <iframe src="https://www.youtube.com/embed/KHrVwCrtZFY?autoplay=1&mute=1&loop=1&playlist=KHrVwCrtZFY&controls=0&showinfo=0&rel=0&modestbranding=1" frameborder="0"></iframe>
    </div>

    <div class="overlay"></div>

    <div class="main-container">
        <div class="glass-panel">
            <h1>Create</h1>
            <nav class="button-list">
                <div class="dropdown">
                    <a href="#" class="btn">Inteligencia Artificial</a>
                    <div class="dropdown-content">
                        <a href="https://gemini.google.com/" target="_blank" class="btn btn-sub">Gemini</a>
                        <a href="https://chatgpt.com/" target="_blank" class="btn btn-sub">ChatGPT</a>
                        <a href="https://claude.ai/" target="_blank" class="btn btn-sub">Claude</a>
                    </div>
                </div>

                <div class="dropdown">
                    <a href="https://github.com/" target="_blank" class="btn">GitHub</a>
                    <div class="dropdown-content">
                        <a href="https://github.com/new" target="_blank" class="btn btn-sub">New Repo</a>
                    </div>
                </div>

                <a href="https://vercel.com/" target="_blank" class="btn">Vercel</a>
                <a href="https://www.youtube.com/" target="_blank" class="btn">YouTube</a>
            </nav>
        </div>

        <div class="instruction-panel">
            <div class="lang-container">
                <button class="btn btn-lang" onclick="setLang('es')">ES</button>
                <button class="btn btn-lang" onclick="setLang('en')">EN</button>
            </div>
            <div id="text-target" class="instruction-content">
                Selecciona un idioma para ver los pasos.
            </div>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('custom-cursor');

        // Movimiento del cursor con suavizado
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Eventos para agrandar y llenar el cursor
        function updateCursor() {
            const links = document.querySelectorAll('a, button');
            links.forEach(link => {
                link.addEventListener('mouseenter', () => cursor.classList.add('active'));
                link.addEventListener('mouseleave', () => cursor.classList.remove('active'));
            });
        }
        updateCursor();

        // Parallax sutil del panel
        const container = document.querySelector('.main-container');
        document.addEventListener('mousemove', e => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            container.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });

        const content = {
            es: "1. Pide el código a la IA.\n2. Súbelo a GitHub (index.html).\n3. Despliega en Vercel.",
            en: "1. Get code from AI.\n2. Upload to GitHub (index.html).\n3. Deploy via Vercel."
        };

        function setLang(l) {
            document.getElementById('text-target').innerText = content[l];
        }
    </script>
</body>
</html>
