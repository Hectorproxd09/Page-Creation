<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Creation - Mobile Ready</title>
    <style>
        /* Reset de estilos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Solo quitamos el cursor si hay puntero */
        }

        @media (pointer: fine) {
            * { cursor: none; }
        }

        body {
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
            padding: 20px 0;
        }

        #custom-cursor {
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transition: transform 0.1s ease, background 0.2s ease;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            display: none; /* Oculto por defecto */
        }

        /* Solo mostrar cursor en PC */
        @media (pointer: fine) {
            #custom-cursor { display: block; }
        }

        .ambient-glow {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(220, 20, 60, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, rgba(139, 0, 0, 0.15) 0%, transparent 40%);
            z-index: -1;
            pointer-events: none;
            animation: glowMove 15s ease infinite alternate;
        }

        @keyframes glowMove {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        .video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
        }

        .video-background iframe {
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 90%;
            max-width: 420px;
            align-items: center;
            perspective: 1000px;
            animation: containerAppear 1s ease-out;
        }

        @keyframes containerAppear {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .glass-panel {
            padding: 2rem;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            transition: transform 0.1s ease;
            transform-style: preserve-3d;
        }

        h1 {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 3px;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .search-container {
            margin-bottom: 20px;
            position: relative;
        }

        .search-bar {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            color: white;
            outline: none;
            font-size: 16px; /* Evita zoom automático en iOS */
        }

        .button-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .btn {
            display: block;
            padding: 14px;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.3s ease;
        }

        /* Hover solo para PC */
        @media (hover: hover) {
            .btn:hover {
                background: rgba(255, 255, 255, 0.1);
                transform: scale(1.02);
                border-color: rgba(255, 255, 255, 0.5);
            }
        }

        .dropdown-content {
            display: none; /* Cambiado de visibilidad a display para móvil */
            flex-direction: column;
            gap: 8px;
            padding: 10px 0;
            z-index: 10;
        }

        /* En PC se muestra a la derecha, en móvil hacia abajo */
        @media (min-width: 768px) {
            .dropdown-content {
                position: absolute;
                left: 105%;
                top: 50%;
                transform: translateY(-50%);
                width: 170px;
            }
            .dropdown:hover .dropdown-content {
                display: flex;
            }
        }

        /* Clase activa para móviles (activada por JS) */
        .dropdown.active .dropdown-content {
            display: flex;
            position: static;
            transform: none;
            width: 100%;
            padding-left: 20px;
        }

        .btn-sub {
            padding: 10px;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 10px;
        }

        .instruction-panel {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            border-radius: 22px;
            padding: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .instruction-content {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 14px;
            font-size: 0.8rem;
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div class="ambient-glow"></div>

    <div class="video-background">
        <iframe src="https://www.youtube.com/embed/KHrVwCrtZFY?autoplay=1&mute=1&loop=1&playlist=KHrVwCrtZFY&controls=0&showinfo=0&rel=0&modestbranding=1" frameborder="0"></iframe>
    </div>

    <div class="overlay"></div>

    <div class="main-container">
        <div class="glass-panel">
            <h1>Page Creation</h1>
            
            <div class="search-container">
                <input type="text" id="main-search" class="search-bar" placeholder="Buscar sitio..." autocomplete="off">
                <div id="results-box" class="search-results"></div>
            </div>

            <nav class="button-list">
                <div class="dropdown" onclick="toggleDropdown(this)">
                    <a href="javascript:void(0)" class="btn">IA ▾</a>
                    <div class="dropdown-content">
                        <a href="https://gemini.google.com/" target="_blank" class="btn btn-sub">Google Gemini</a>
                        <a href="https://claude.ai/" target="_blank" class="btn btn-sub">ClaudeAI</a>
                        <a href="https://chatgpt.com/" target="_blank" class="btn btn-sub">ChatGPT</a>
                        <a href="https://replit.com/" target="_blank" class="btn btn-sub">Replit</a>
                        <a href="https://lovable.dev/" target="_blank" class="btn btn-sub">Lovable</a>
                        <a href="https://bolt.new/" target="_blank" class="btn btn-sub">Bolt</a>
                        <a href="https://v0.app/" target="_blank" class="btn btn-sub">Vercel IA</a>
                    </div>
                </div>

                <div class="dropdown" onclick="toggleDropdown(this)">
                    <a href="https://github.com/" target="_blank" class="btn">GitHub ▾</a>
                    <div class="dropdown-content">
                        <a href="https://github.com/new" target="_blank" class="btn btn-sub">Nuevo Repositorio</a>
                    </div>
                </div>

                <a href="https://vercel.com/" target="_blank" class="btn">Vercel</a>
                <a href="https://codeshack.io/html-viewer/" target="_blank" class="btn">Visor HTML</a>
                <a href="https://www.youtube.com/" target="_blank" class="btn">YouTube</a>
            </nav>
        </div>

        <div class="instruction-panel">
            <div class="lang-container" style="display:flex; gap:10px; margin-bottom:10px;">
                <button class="btn" style="flex:1; padding:5px;" onclick="setLang('es')">ES</button>
                <button class="btn" style="flex:1; padding:5px;" onclick="setLang('en')">EN</button>
            </div>
            <div id="text-target" class="instruction-content">Selecciona un idioma</div>
        </div>
    </div>

    <script>
        // Función para abrir menús en móviles
        function toggleDropdown(element) {
            if (window.innerWidth < 768) {
                element.classList.toggle('active');
            }
        }

        // Cursor (Solo si hay ratón)
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', e => {
            if (cursor.style.display !== 'none') {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            }
        });

        // Parallax sutil (Solo en pantallas grandes)
        const glassPanel = document.querySelector('.glass-panel');
        document.addEventListener('mousemove', e => {
            if (window.innerWidth > 768) {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 70;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 70;
                glassPanel.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            }
        });

        // Instrucciones
        const content = {
            es: "INSTRUCCIONES: Pide a una IA un código HTML. Crea un repo en GitHub con un index.html. Ve a Vercel, conecta tu GitHub y despliega el proyecto.",
            en: "INSTRUCTIONS: Ask an AI for HTML code. Create a GitHub repo with index.html. Go to Vercel, connect your GitHub, and deploy."
        };

        function setLang(lang) {
            document.getElementById('text-target').innerText = content[lang];
        }

        // Búsqueda simple
        const searchInput = document.getElementById('main-search');
        searchInput.addEventListener('input', () => {
            console.log("Buscando: " + searchInput.value);
            // Aquí puedes re-integrar la lógica de filtrado de la versión anterior si la necesitas
        });
    </script>
</body>
</html>
