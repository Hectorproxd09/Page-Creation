<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Creation - Premium Edition</title>
    <style>
        /* --- ESTILO PREMIUM RECARGADO --- */
        :root {
            --primary-glow: rgba(255, 255, 255, 0.15);
            --accent-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            cursor: none; /* Ocultamos el cursor real */
        }

        body {
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #020202;
        }

        /* CURSOR DINÁMICO MEJORADO */
        #custom-cursor {
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        background 0.3s ease, 
                        border-color 0.3s ease;
            transform: translate(-50%, -50%);
        }

        /* Esta clase se activa con JS: se vuelve negro sobre el botón blanco */
        #custom-cursor.active {
            background: rgba(0, 0, 0, 1) !important;
            border-color: rgba(0, 0, 0, 1);
            transform: translate(-50%, -50%) scale(1.5);
        }

        /* FONDO Y EFECTOS */
        .video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            filter: saturate(1.2) brightness(0.4);
        }

        .video-background iframe {
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }

        .ambient-glow {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(70, 0, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 100, 0.08) 0%, transparent 50%);
            z-index: -1;
        }

        /* CONTENEDOR Y PANELES */
        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 95%;
            max-width: 440px;
            perspective: 1500px;
        }

        .glass-panel {
            padding: 3.5rem 2.5rem;
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 32px;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            text-align: center;
            transform-style: preserve-3d;
        }

        h1 {
            color: #fff;
            font-size: 1.6rem;
            font-weight: 200;
            letter-spacing: 7px;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .button-list {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .btn {
            display: block;
            padding: 16px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 2px;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .btn:hover {
            color: #000 !important;
            background: #fff !important;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
        }

        /* DROPDOWNS */
        .dropdown { position: relative; }

        .dropdown-content {
            position: absolute;
            left: 105%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            visibility: hidden;
            z-index: 10;
        }

        .btn-sub {
            width: 180px;
            padding: 12px;
            font-size: 0.8rem;
            background: rgba(10, 10, 10, 0.8) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff !important;
            opacity: 0;
            transform: translateX(-15px);
            transition: all 0.3s ease;
        }

        .dropdown:hover .dropdown-content {
            pointer-events: auto;
            visibility: visible;
        }

        .dropdown:hover .btn-sub {
            opacity: 1;
            transform: translateX(0);
        }

        .btn-sub:hover {
            background: #fff !important;
            color: #000 !important;
        }

        /* INSTRUCCIONES */
        .instruction-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            padding: 1.8rem;
            text-align: center;
        }

        .lang-container {
            display: flex; gap: 10px; margin-bottom: 15px;
        }

        .btn-lang {
            flex: 1; padding: 10px; font-size: 0.75rem; text-transform: uppercase;
        }

        .instruction-content {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 1.2rem;
            font-size: 0.85rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.7);
            max-height: 150px;
            overflow-y: auto;
            text-align: left;
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div class="ambient-glow"></div>

    <div class="video-background">
        <iframe src="https://www.youtube.com/embed/KHrVwCrtZFY?autoplay=1&mute=1&loop=1&playlist=KHrVwCrtZFY&controls=0&showinfo=0&rel=0&modestbranding=1" frameborder="0" allow="autoplay; encrypted-media"></iframe>
    </div>

    <div class="overlay"></div>

    <div class="main-container">
        <div class="glass-panel">
            <h1>Page Creation</h1>
            <nav class="button-list">
                <div class="dropdown">
                    <a href="https://ai-delta-eosin.vercel.app/" target="_blank" class="btn">IA</a>
                    <div class="dropdown-content">
                        <a href="https://gemini.google.com/app?hl=es" target="_blank" class="btn btn-sub">Google Gemini</a>
                        <a href="https://hackerai.co/" target="_blank" class="btn btn-sub">HackerAI</a>
                        <a href="https://claude.ai/new" target="_blank" class="btn btn-sub">ClaudeAI</a>
                        <a href="https://chatgpt.com/" target="_blank" class="btn btn-sub">ChatGPT</a>
                    </div>
                </div>

                <div class="dropdown">
                    <a href="https://github.com/" target="_blank" class="btn">GitHub</a>
                    <div class="dropdown-content">
                        <a href="https://github.com/new" target="_blank" class="btn btn-sub">Nuevo Repositorio</a>
                    </div>
                </div>

                <a href="https://vercel.com/" target="_blank" class="btn">Vercel</a>
                <a href="https://www.youtube.com/" target="_blank" class="btn">YouTube</a>
            </nav>
        </div>

        <div class="instruction-panel">
            <div class="lang-container">
                <button class="btn btn-lang" onclick="setLang('es')">Español</button>
                <button class="btn btn-lang" onclick="setLang('en')">English</button>
            </div>
            <div id="text-target" class="instruction-content">
                <p style="opacity: 0.5; text-align: center; font-size: 0.8rem;">Select language for tutorial</p>
            </div>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('custom-cursor');

        // Movimiento del cursor
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Lógica del cursor: se vuelve NEGRO al tocar botones (porque el botón se vuelve BLANCO)
        function updateCursorListeners() {
            const elements = document.querySelectorAll('a, button');
            elements.forEach(el => {
                el.addEventListener('mouseenter', () => {
                    cursor.classList.add('active');
                });
                el.addEventListener('mouseleave', () => {
                    cursor.classList.remove('active');
                });
            });
        }
        updateCursorListeners();

        // Parallax suave
        const glass = document.querySelector('.glass-panel');
        const instruct = document.querySelector('.instruction-panel');
        document.addEventListener('mousemove', e => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 70;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 70;
            if(glass) glass.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            if(instruct) instruct.style.transform = `rotateY(${xAxis * 1.1}deg) rotateX(${yAxis * 1.1}deg)`;
        });

        // Contenidos
        const content = {
            es: `INSTRUCCIONES:\n1. Solicita a una IA el código HTML.\n2. Crea un repositorio en GitHub.\n3. Añade un "index.html" con el código.\n4. Conecta tu GitHub a Vercel y despliega el proyecto.`,
            en: `INSTRUCTIONS:\n1. Ask an AI for the HTML code.\n2. Create a GitHub repository.\n3. Add an "index.html" file.\n4. Connect GitHub to Vercel and deploy.`
        };

        function setLang(lang) {
            document.getElementById('text-target').innerText = content[lang];
        }
    </script>
</body>
</html>
